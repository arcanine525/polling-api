basePath: /api/v1
definitions:
  polling-system_auth_models.ErrorResponse:
    properties:
      error:
        type: string
    type: object
  polling-system_auth_models.LoginRequest:
    properties:
      email:
        type: string
      password:
        type: string
    required:
    - email
    - password
    type: object
  polling-system_auth_models.LoginResponse:
    properties:
      expires_in:
        type: string
      id_token:
        type: string
      refresh_token:
        type: string
      user:
        $ref: '#/definitions/polling-system_auth_models.User'
    type: object
  polling-system_auth_models.PaginatedUsers:
    properties:
      items:
        items:
          $ref: '#/definitions/polling-system_auth_models.User'
        type: array
      page:
        type: integer
      pages:
        type: integer
      size:
        type: integer
      total:
        type: integer
    type: object
  polling-system_auth_models.User:
    properties:
      created_at:
        type: string
      display_name:
        type: string
      email:
        type: string
      firebase_uid:
        type: string
      id:
        type: string
      role:
        type: string
      updated_at:
        type: string
    type: object
  polling-system_auth_models.UserCreate:
    properties:
      display_name:
        type: string
      email:
        type: string
      firebase_uid:
        type: string
      role:
        enum:
        - admin
        - poller
        - viewer
        type: string
    required:
    - email
    - firebase_uid
    type: object
  polling-system_auth_models.UserRoleUpdate:
    properties:
      role:
        enum:
        - admin
        - poller
        - viewer
        type: string
    required:
    - role
    type: object
  polling-system_auth_models.UserUpdate:
    properties:
      display_name:
        type: string
    type: object
  polling-system_contact_models.BulkContactCreate:
    properties:
      phone_numbers:
        items:
          type: string
        minItems: 1
        type: array
      poll_id:
        type: string
    required:
    - phone_numbers
    - poll_id
    type: object
  polling-system_contact_models.BulkContactResult:
    properties:
      created:
        items:
          $ref: '#/definitions/polling-system_contact_models.Contact'
        type: array
      duplicate:
        items:
          type: string
        type: array
      invalid:
        items:
          type: string
        type: array
    type: object
  polling-system_contact_models.Contact:
    properties:
      created_at:
        type: string
      file_id:
        type: string
      id:
        type: string
      name:
        type: string
      phone_normalized:
        type: string
      phone_number:
        type: string
      poll_id:
        type: string
      updated_at:
        type: string
    type: object
  polling-system_contact_models.ContactCreate:
    properties:
      file_id:
        type: string
      name:
        type: string
      phone_number:
        type: string
      poll_id:
        type: string
    required:
    - phone_number
    type: object
  polling-system_contact_models.ContactUpdate:
    properties:
      name:
        type: string
      phone_number:
        type: string
    type: object
  polling-system_contact_models.ErrorResponse:
    properties:
      error:
        example: something went wrong
        type: string
    type: object
  polling-system_contact_models.File:
    properties:
      contacts:
        items:
          $ref: '#/definitions/polling-system_contact_models.Contact'
        type: array
      created_at:
        type: string
      created_by:
        type: string
      creator:
        $ref: '#/definitions/polling-system_auth_models.User'
      file_name:
        type: string
      id:
        type: string
      notes:
        type: string
      record_count:
        type: integer
      updated_at:
        type: string
      updated_by:
        type: string
    type: object
  polling-system_contact_models.PaginatedContacts:
    properties:
      items:
        items:
          $ref: '#/definitions/polling-system_contact_models.Contact'
        type: array
      page:
        type: integer
      pages:
        type: integer
      size:
        type: integer
      total:
        type: integer
    type: object
  polling-system_contact_models.PaginatedFiles:
    properties:
      items:
        items:
          $ref: '#/definitions/polling-system_contact_models.File'
        type: array
      page:
        type: integer
      pages:
        type: integer
      size:
        type: integer
      total:
        type: integer
    type: object
  polling-system_polling_models.Answer:
    properties:
      answer:
        type: string
      candidate:
        $ref: '#/definitions/polling-system_polling_models.Candidate'
      candidate_id:
        type: string
      created_at:
        type: string
      id:
        type: string
      question:
        $ref: '#/definitions/polling-system_polling_models.PollQuestion'
      question_id:
        type: string
      source:
        type: string
    type: object
  polling-system_polling_models.AnswerCreate:
    properties:
      answer:
        type: string
      candidate_id:
        type: string
      source:
        type: string
    required:
    - answer
    - candidate_id
    type: object
  polling-system_polling_models.BulkCandidateCreate:
    properties:
      phone_numbers:
        items:
          type: string
        minItems: 1
        type: array
    required:
    - phone_numbers
    type: object
  polling-system_polling_models.BulkCandidateResult:
    properties:
      created:
        type: integer
      duplicates:
        items:
          type: string
        type: array
      invalid:
        items:
          type: string
        type: array
    type: object
  polling-system_polling_models.Candidate:
    properties:
      answers:
        items:
          $ref: '#/definitions/polling-system_polling_models.Answer'
        type: array
      created_at:
        type: string
      id:
        type: string
      phone:
        type: string
      poll:
        $ref: '#/definitions/polling-system_polling_models.Poll'
      poll_id:
        type: string
      updated_at:
        type: string
      voice_poll_sentiment:
        type: string
      voice_poll_started_at:
        type: string
      voicemail_detected:
        type: boolean
    type: object
  polling-system_polling_models.CandidateCreate:
    properties:
      phone:
        type: string
    required:
    - phone
    type: object
  polling-system_polling_models.CandidateUpdate:
    properties:
      phone:
        type: string
      voice_poll_sentiment:
        type: string
      voice_poll_started_at:
        type: string
      voicemail_detected:
        type: boolean
    type: object
  polling-system_polling_models.ErrorResponse:
    properties:
      error:
        example: something went wrong
        type: string
    type: object
  polling-system_polling_models.PaginatedAnswers:
    properties:
      items:
        items:
          $ref: '#/definitions/polling-system_polling_models.Answer'
        type: array
      page:
        type: integer
      pages:
        type: integer
      size:
        type: integer
      total:
        type: integer
    type: object
  polling-system_polling_models.PaginatedCandidates:
    properties:
      items:
        items:
          $ref: '#/definitions/polling-system_polling_models.Candidate'
        type: array
      page:
        type: integer
      pages:
        type: integer
      size:
        type: integer
      total:
        type: integer
    type: object
  polling-system_polling_models.PaginatedPolls:
    properties:
      items:
        items:
          $ref: '#/definitions/polling-system_polling_models.Poll'
        type: array
      page:
        type: integer
      pages:
        type: integer
      size:
        type: integer
      total:
        type: integer
    type: object
  polling-system_polling_models.PaginatedQuestions:
    properties:
      items:
        items:
          $ref: '#/definitions/polling-system_polling_models.PollQuestion'
        type: array
      page:
        type: integer
      pages:
        type: integer
      size:
        type: integer
      total:
        type: integer
    type: object
  polling-system_polling_models.Poll:
    properties:
      bland_pathway_ids:
        type: object
      candidates:
        items:
          $ref: '#/definitions/polling-system_polling_models.Candidate'
        type: array
      created_at:
        type: string
      created_by:
        type: string
      creator:
        $ref: '#/definitions/polling-system_auth_models.User'
      custom_voice_poll_instructions:
        type: string
      dont_send_sms:
        type: boolean
      first_typeform_sms_text:
        type: string
      id:
        type: string
      only_day_hours:
        type: boolean
      poll_name:
        type: string
      poller_name:
        type: string
      questions:
        items:
          $ref: '#/definitions/polling-system_polling_models.PollQuestion'
        type: array
      scheduled_to_start_at:
        type: string
      status:
        type: string
      time_zone:
        type: string
      typeform_forms:
        type: object
      updated_at:
        type: string
      voice_poll_delay_minutes:
        type: integer
      voice_poll_method:
        type: string
    type: object
  polling-system_polling_models.PollCreate:
    properties:
      bland_pathway_ids:
        type: object
      custom_voice_poll_instructions:
        type: string
      dont_send_sms:
        type: boolean
      first_typeform_sms_text:
        type: string
      only_day_hours:
        type: boolean
      poll_name:
        type: string
      poller_name:
        type: string
      scheduled_to_start_at:
        type: string
      status:
        type: string
      time_zone:
        type: string
      typeform_forms:
        type: object
      voice_poll_delay_minutes:
        type: integer
      voice_poll_method:
        type: string
    required:
    - poll_name
    type: object
  polling-system_polling_models.PollQuestion:
    properties:
      answer_options:
        type: object
      answer_type:
        type: string
      answers:
        items:
          $ref: '#/definitions/polling-system_polling_models.Answer'
        type: array
      created_at:
        type: string
      default_next_question:
        $ref: '#/definitions/polling-system_polling_models.PollQuestion'
      default_next_question_id:
        type: string
      flow_rules:
        type: object
      id:
        type: string
      poll:
        $ref: '#/definitions/polling-system_polling_models.Poll'
      poll_id:
        type: string
      question:
        type: string
      randomize_answers:
        type: boolean
      typeform_field_id:
        type: string
      updated_at:
        type: string
    type: object
  polling-system_polling_models.PollQuestionCreate:
    properties:
      answer_options:
        type: object
      answer_type:
        type: string
      default_next_question_id:
        type: string
      flow_rules:
        type: object
      question:
        type: string
      randomize_answers:
        type: boolean
      typeform_field_id:
        type: string
    required:
    - answer_type
    - question
    type: object
  polling-system_polling_models.PollQuestionUpdate:
    properties:
      answer_options:
        type: object
      answer_type:
        type: string
      default_next_question_id:
        type: string
      flow_rules:
        type: object
      question:
        type: string
      randomize_answers:
        type: boolean
      typeform_field_id:
        type: string
    type: object
  polling-system_polling_models.PollUpdate:
    properties:
      bland_pathway_ids:
        type: object
      custom_voice_poll_instructions:
        type: string
      dont_send_sms:
        type: boolean
      first_typeform_sms_text:
        type: string
      only_day_hours:
        type: boolean
      poll_name:
        type: string
      poller_name:
        type: string
      scheduled_to_start_at:
        type: string
      status:
        type: string
      time_zone:
        type: string
      typeform_forms:
        type: object
      voice_poll_delay_minutes:
        type: integer
      voice_poll_method:
        type: string
    type: object
host: localhost:8080
info:
  contact: {}
  description: Unified API for authentication, polls, contacts, and file management.
  title: Polling System API
  version: "1.0"
paths:
  /answers/{id}:
    delete:
      description: Deletes an answer. Admin only.
      parameters:
      - description: Answer UUID
        in: path
        name: id
        required: true
        type: string
      responses:
        "204":
          description: No Content
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/polling-system_polling_models.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Delete an answer
      tags:
      - Answers
    get:
      description: Returns a single answer.
      parameters:
      - description: Answer UUID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/polling-system_polling_models.Answer'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/polling-system_polling_models.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get answer by ID
      tags:
      - Answers
  /auth/login:
    post:
      consumes:
      - application/json
      description: Authenticates a user with email/password via Firebase Auth, provisions
        the user if new, and returns the user profile with tokens.
      parameters:
      - description: Login credentials
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/polling-system_auth_models.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/polling-system_auth_models.LoginResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/polling-system_auth_models.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/polling-system_auth_models.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/polling-system_auth_models.ErrorResponse'
      summary: Login with email and password
      tags:
      - Auth
  /auth/token:
    post:
      description: Verifies the Firebase ID token (via middleware), provisions the
        user if new, and returns the user profile.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/polling-system_auth_models.User'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/polling-system_auth_models.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/polling-system_auth_models.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Exchange Firebase token for user profile
      tags:
      - Auth
  /candidates:
    get:
      description: Returns a paginated list of candidates, filtered by poll_id.
      parameters:
      - description: Poll UUID to filter by
        in: query
        name: poll_id
        required: true
        type: string
      - default: 1
        description: 'Page number (min: 1)'
        in: query
        name: page
        type: integer
      - default: 20
        description: Items per page (1-100)
        in: query
        name: size
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/polling-system_polling_models.PaginatedCandidates'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/polling-system_polling_models.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/polling-system_polling_models.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Query candidates
      tags:
      - Candidates
  /candidates/{candidateId}/answers:
    get:
      description: Returns a paginated list of all answers submitted by a candidate.
      parameters:
      - description: Candidate UUID
        in: path
        name: candidateId
        required: true
        type: string
      - default: 1
        description: 'Page number (min: 1)'
        in: query
        name: page
        type: integer
      - default: 20
        description: Items per page (1-100)
        in: query
        name: size
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/polling-system_polling_models.PaginatedAnswers'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/polling-system_polling_models.ErrorResponse'
      security:
      - BearerAuth: []
      summary: List answers by a candidate
      tags:
      - Answers
  /candidates/{id}:
    delete:
      description: Deletes a candidate and its answers. Requires ownership of the
        parent poll for pollers.
      parameters:
      - description: Candidate UUID
        in: path
        name: id
        required: true
        type: string
      responses:
        "204":
          description: No Content
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/polling-system_polling_models.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/polling-system_polling_models.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Delete a candidate
      tags:
      - Candidates
    get:
      description: Returns a single candidate.
      parameters:
      - description: Candidate UUID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/polling-system_polling_models.Candidate'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/polling-system_polling_models.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get candidate by ID
      tags:
      - Candidates
    patch:
      consumes:
      - application/json
      description: Partially updates a candidate. Requires ownership of the parent
        poll for pollers.
      parameters:
      - description: Candidate UUID
        in: path
        name: id
        required: true
        type: string
      - description: Fields to update
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/polling-system_polling_models.CandidateUpdate'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/polling-system_polling_models.Candidate'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/polling-system_polling_models.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/polling-system_polling_models.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/polling-system_polling_models.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Update a candidate
      tags:
      - Candidates
  /contacts:
    get:
      description: Returns a paginated list of contacts, optionally filtered by file_id,
        poll_id, name, or phone number.
      parameters:
      - default: 1
        description: 'Page number (min: 1)'
        in: query
        name: page
        type: integer
      - default: 20
        description: Items per page (1-100)
        in: query
        name: size
        type: integer
      - description: Filter by file UUID
        in: query
        name: file_id
        type: string
      - description: Filter by poll UUID
        in: query
        name: poll_id
        type: string
      - description: Filter by name (partial match)
        in: query
        name: name
        type: string
      - description: Filter by phone (partial match)
        in: query
        name: phone
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/polling-system_contact_models.PaginatedContacts'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/polling-system_contact_models.ErrorResponse'
      security:
      - BearerAuth: []
      summary: List contacts
      tags:
      - Contacts
    post:
      consumes:
      - application/json
      description: Creates a new contact. Phone normalization is calculated automatically.
      parameters:
      - description: Contact to create
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/polling-system_contact_models.ContactCreate'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/polling-system_contact_models.Contact'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/polling-system_contact_models.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/polling-system_contact_models.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Create a contact
      tags:
      - Contacts
  /contacts/{id}:
    delete:
      description: Permanently removes a contact from the database.
      parameters:
      - description: Contact UUID
        in: path
        name: id
        required: true
        type: string
      responses:
        "204":
          description: No Content
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/polling-system_contact_models.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/polling-system_contact_models.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Delete a contact
      tags:
      - Contacts
    patch:
      consumes:
      - application/json
      description: Updates the name and/or phone number of an existing contact. Phone
        normalization is recalculated automatically.
      parameters:
      - description: Contact UUID
        in: path
        name: id
        required: true
        type: string
      - description: Fields to update
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/polling-system_contact_models.ContactUpdate'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/polling-system_contact_models.Contact'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/polling-system_contact_models.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/polling-system_contact_models.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/polling-system_contact_models.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Update a contact
      tags:
      - Contacts
  /contacts/bulk:
    post:
      consumes:
      - application/json
      description: Creates multiple contacts from a list of phone numbers for a specific
        poll. Duplicates and invalid numbers are skipped and reported.
      parameters:
      - description: Bulk contact creation request
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/polling-system_contact_models.BulkContactCreate'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/polling-system_contact_models.BulkContactResult'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/polling-system_contact_models.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/polling-system_contact_models.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Bulk create contacts
      tags:
      - Contacts
  /files:
    get:
      description: Returns a paginated list of uploaded CSV files.
      parameters:
      - default: 1
        description: 'Page number (min: 1)'
        in: query
        name: page
        type: integer
      - default: 20
        description: Items per page (1-100)
        in: query
        name: size
